<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 - Page Not Found | Mahir Aktaş</title>
  <meta name="robots" content="noindex, follow" />
  <style>
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0f1a;
      color: #f1f5f9;
      font-family: system-ui, -apple-system, sans-serif;
    }
    .container {
      text-align: center;
      padding: 2rem;
      max-width: 480px;
    }
    h1 {
      font-size: 4rem;
      margin: 0 0 0.5rem;
      background: linear-gradient(135deg, #10b981, #06b6d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    p {
      color: #94a3b8;
      font-size: 1.125rem;
      margin: 0 0 1.5rem;
    }
    a {
      display: inline-block;
      padding: 0.75rem 1.5rem;
      background: #059669;
      color: #fff;
      text-decoration: none;
      border-radius: 0.5rem;
      font-weight: 500;
      transition: background 0.2s;
    }
    a:hover {
      background: #047857;
    }
    .logo {
      width: 64px;
      height: 64px;
      margin: 0 auto 1.5rem;
      border-radius: 12px;
      background: linear-gradient(135deg, #10b981, #06b6d4);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      color: #fff;
      font-size: 1.5rem;
    }
  </style>
  <script>
    setTimeout(() => {
      window.location.replace('/');
    }, 3000);
  </script>
</head>
<body>
  <div class="container">
    <div class="logo">MA</div>
    <h1>404</h1>
    <p>This page took a wrong turn in the architecture. Redirecting you home...</p>
    <a href="/">Go to Portfolio</a>
  </div>
</body>
</html>
